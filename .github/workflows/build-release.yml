name: Build and Release PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Typst
        uses: typst-community/setup-typst@v4

      - name: Compiler le PDF
        run: |
          mkdir -p dist
          typst compile main.typ dist/document.pdf

      - name: Ajouter le PDF comme artifact
        uses: actions/upload-artifact@v4
        with:
          name: document-pdf
          path: dist/document.pdf

      - name: Créer une release automatique
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Dernière version PDF
          body: |
            PDF généré automatiquement depuis le dernier push sur main.
          files: dist/document.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}